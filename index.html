<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rượu Nam Quốc Tửu | Tinh Hoa Đại Ngàn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Manrope:wght@200;300;400;500;600;700&family=Allison&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500;1,600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Manrope"', 'sans-serif'],
              script: ['"Allison"', 'cursive'],
              display: ['"Cormorant Garamond"', 'serif'],
            },
            colors: {
              cream: {
                50: '#fcfbf9',
                100: '#f6f5f1',
                200: '#eeebe2', // Main bg
                300: '#e0dccf',
                900: '#3d3832',
              },
              emerald: {
                800: '#065f46',
                850: '#064e3b',
                900: '#03382d',
                950: '#022c22', // Deepest green
              },
              amber: {
                200: '#fde68a',
                350: '#fbbf24',
                450: '#f59e0b',
                750: '#b45309', // Bronze gold
                900: '#78350f',
              }
            },
            backgroundImage: {
              'noise': "url('https://www.transparenttextures.com/patterns/stardust.png')",
              'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'float-delayed': 'float 8s ease-in-out 4s infinite',
              'fade-in-up': 'fadeInUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'spin-slow': 'spin 20s linear infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'reveal': 'reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(40px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              reveal: {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #f6f5f1;
        overflow-x: hidden;
      }
      
      ::selection {
        background-color: #b45309;
        color: #fff;
      }
      
      /* Cinematic Noise Overlay */
      #noise-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      h1, h2, h3, h4, h5, h6, .font-serif {
        font-family: 'Playfair Display', serif;
      }
      
      .font-display {
        font-family: 'Cormorant Garamond', serif;
      }
      
      .font-script {
        font-family: 'Allison', cursive;
      }

      /* Indochine Shapes */
      .arch-window {
        border-top-left-radius: 999px;
        border-top-right-radius: 999px;
      }
      
      /* Text Effects */
      .text-outline {
        -webkit-text-stroke: 1px rgba(255,255,255,0.2);
        color: transparent;
      }
      
      .text-vertical {
        writing-mode: vertical-rl;
        text-orientation: mixed;
      }

      /* Reveal Animation Utility */
      .reveal-container {
        overflow: hidden;
      }
      .reveal-text {
        display: block;
        transform: translateY(100%);
        animation: reveal 1s cubic-bezier(0.77, 0, 0.175, 1) forwards;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f6f5f1;
      }
      ::-webkit-scrollbar-thumb {
        background: #b45309;
        border-radius: 4px;
        border: 2px solid #f6f5f1;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #78350f;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.1/",
    "react-router-dom": "https://esm.sh/react-router-dom@^7.10.1",
    "lucide-react": "https://esm.sh/lucide-react@^0.559.0",
    "react/": "https://esm.sh/react@^19.2.1/",
    "react": "https://esm.sh/react@^19.2.1"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="text-stone-800 antialiased">
    <div id="noise-overlay"></div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
