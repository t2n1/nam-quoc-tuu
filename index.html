
<!DOCTYPE html>
<html lang="vi" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Rượu Nam Quốc Tửu | Tinh Hoa Đại Ngàn</title>
    <link rel="icon" type="image/svg+xml" href="/logo-nqt.svg" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700&family=Manrope:wght@200;300;400;500;600;700&family=Allison&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Playfair Display"', 'serif'],
              sans: ['"Manrope"', 'sans-serif'],
              script: ['"Allison"', 'cursive'],
              display: ['"Cormorant Garamond"', 'serif'],
            },
            colors: {
              cream: {
                50: '#fcfbf9',
                100: '#f6f5f1',
                200: '#eeebe2',
                300: '#e0dccf',
                900: '#3d3832',
              },
              emerald: {
                800: '#065f46',
                850: '#064e3b',
                900: '#03382d',
                950: '#022c22',
              },
              amber: {
                200: '#fde68a',
                350: '#fbbf24',
                450: '#f59e0b',
                750: '#b45309',
                900: '#78350f',
              },
            },
            animation: {
              'float': 'float 8s ease-in-out infinite',
              'fade-in-up': 'fadeInUp 1s cubic-bezier(0.2, 1, 0.4, 1) forwards',
              'reveal': 'reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards',
              'scale-slow': 'scaleSlow 20s linear infinite alternate',
              'marquee-left': 'marqueeLeft 40s linear infinite',
              'marquee-right': 'marqueeRight 40s linear infinite',
              'marquee': 'marquee 40s linear infinite',
              'spin-slow': 'spin 12s linear infinite',
              'pulse-soft': 'pulseSoft 4s ease-in-out infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              fadeInUp: {
                '0%': { opacity: '0', transform: 'translateY(30px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              reveal: {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
              scaleSlow: {
                '0%': { transform: 'scale(1)' },
                '100%': { transform: 'scale(1.1)' },
              },
              marqueeLeft: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              marqueeRight: {
                '0%': { transform: 'translateX(-50%)' },
                '100%': { transform: 'translateX(0)' },
              },
              marquee: {
                '0%': { transform: 'translateX(0)' },
                '100%': { transform: 'translateX(-50%)' },
              },
              pulseSoft: {
                '0%, 100%': { opacity: '1' },
                '50%': { opacity: '0.5' },
              },
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Manrope', sans-serif;
        background-color: #022c22;
        overflow-x: hidden;
      }
      
      ::selection {
        background-color: #f59e0b;
        color: #fff;
      }
      
      ::-webkit-scrollbar {
        width: 0px; 
        background: transparent; 
      }

      /* Luxury Film Grain */
      .grain::after {
        content: "";
        position: fixed;
        top: -150%; left: -150%; width: 300%; height: 300%;
        background-image: url('https://www.transparenttextures.com/patterns/black-linen.png');
        opacity: 0.12;
        pointer-events: none;
        z-index: 1000;
        animation: noise 8s steps(10) infinite;
      }

      @keyframes noise {
        0%, 100% { transform: translate(0,0); }
        10% { transform: translate(-5%,-10%); }
        30% { transform: translate(-10%,5%); }
        50% { transform: translate(5%,10%); }
        70% { transform: translate(10%,-5%); }
        90% { transform: translate(-5%,5%); }
      }

      .text-vertical {
        writing-mode: vertical-rl;
        text-orientation: mixed;
      }

      .perspective-1000 {
        perspective: 1000px;
      }

      /* Custom scroll behavior for sections */
      .reveal-on-scroll {
        opacity: 0;
        transform: translateY(40px);
        transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      }
      .reveal-on-scroll.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  <link rel="stylesheet" href="/index.css">
</head>
  <body class="antialiased grain">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
